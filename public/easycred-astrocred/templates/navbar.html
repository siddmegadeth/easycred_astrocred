<!-- Bootstrap 5 Navbar -->
<style>
/* Navbar Dark Theme & Text Visibility */
.astrocred-header-container {
    background: var(--astro-gradient-card) !important;
    backdrop-filter: blur(20px) !important;
    border-bottom: 1px solid var(--astro-border) !important;
}

.navbar {
    background: transparent !important;
    color: #FFFFFF !important;
}

.navbar-brand,
.navbar-nav,
.nav-link {
    color: rgba(255, 255, 255, 0.95) !important;
}

.nav-link:hover {
    color: var(--astro-accent) !important;
}

.nav-link.active {
    color: var(--astro-accent) !important;
    font-weight: 600 !important;
}

.astrocred-logo-text {
    color: #FFFFFF !important;
    background: linear-gradient(to right, var(--astro-accent), #FFFFFF) !important;
    -webkit-background-clip: text !important;
    background-clip: text !important;
}
</style>
<header class="astrocred-header-container" ng-controller="navbarCtrl">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-2" style="margin-bottom: 20px; background: transparent !important;">
        <div class="container-fluid">
            <!-- Logo/Brand -->
            <a class="navbar-brand d-flex align-items-center text-decoration-none me-0">
                <div class="me-2">
                    <i class="fas fa-robot fs-3" style="color: #7b2cbf;"></i>
                </div>
                <div class="fs-4 fw-bold astrocred-logo-text">ASTROCRED</div>
            </a>

            <!-- Toggle button for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar items -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="navbar-nav align-items-center">
                    <a class="nav-link mx-2" href="#/home" ng-class="{ 'active': isActive('/home')}"
                        ng-if="showNavLink">Credit</a>
                    <a class="nav-link mx-2" href="#/financial-dashboard"
                        ng-class="{ 'active': isActive('/financial-dashboard')}" ng-if="showNavLink">Financial Hub</a>
                    <a class="nav-link mx-2" href="#/finvu-connect" ng-class="{ 'active': isActive('/finvu-connect')}" ng-if="showNavLink">
                        <i class="fas fa-university me-1"></i>Link Bank
                    </a>
                    <a class="nav-link mx-2" href="#/profile" ng-class="{ 'active': isActive('/profile')}"
                        ng-if="showNavLink">Profile</a>
                    <a class="nav-link mx-2" href="#/pricing" ng-if="showNavLink" title="Subscription">
                        <span class="badge rounded-pill" ng-class="{
                            'bg-secondary': subscriptionPlan === 'FREE' || !subscriptionPlan,
                            'bg-primary': subscriptionPlan === 'PRO',
                            'bg-warning text-dark': subscriptionPlan === 'PREMIUM',
                            'bg-dark': subscriptionPlan === 'ENTERPRISE'
                        }">{{subscriptionPlanName || subscriptionPlan || 'Free'}}</span>
                    </a>
                    <a class="nav-link mx-2" href="#/login" ng-class="{ 'active': isActive('/login')}"
                        ng-if="showLoginLink">Login</a>
                    <a class="nav-link mx-2" href="#/logout" ng-class="{ 'active': isActive('/logout')}"
                        ng-if="showLogoutLink" ng-click="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>
</header>

<style>
    :root {
        --astrocred-primary: #0a2540;
        --astrocred-secondary: #00b4d8;
        --astrocred-accent: #7b2cbf;
        --astrocred-light: #f8f9fa;
        --astrocred-gray: #6c757d;
        --astrocred-dark: #212529;
        --astrocred-success: #2ecc71;
        --astrocred-warning: #f39c12;
        --astrocred-danger: #e74c3c;
    }

    /* Custom logo text gradient */
    .astrocred-logo-text {
        background: linear-gradient(to right, var(--astrocred-primary), var(--astrocred-accent));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    /* Custom nav link hover effect */
    .nav-link {
        color: var(--astrocred-primary) !important;
        font-weight: 500;
        transition: color 0.3s;
    }

    .nav-link:hover {
        color: var(--astrocred-secondary) !important;
    }

    .nav-link.active {
        color: var(--astrocred-accent) !important;
        font-weight: 600;
    }

    /* Container max-width */
    .container-fluid {
        max-width: 1200px;
    }
</style>
