<!-- Bootstrap 5 Navbar -->
<header class="astrocred-header-container" ng-controller="navbarCtrl">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-2" style="margin-bottom: 20px; background: transparent !important;">
        <div class="container-fluid">
            <!-- Logo/Brand -->
            <a class="navbar-brand d-flex align-items-center text-decoration-none me-0">
                <div class="me-2">
                    <i class="fas fa-robot fs-3" style="color: #7b2cbf;"></i>
                </div>
                <div class="fs-4 fw-bold astrocred-logo-text">ASTROCRED</div>
            </a>

            <!-- Toggle button for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar items -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="navbar-nav align-items-center">
                    <a class="nav-link mx-2" href="#/home" ng-class="{ 'active': isActive('/home')}"
                        ng-if="showNavLink">Credit</a>
                    <a class="nav-link mx-2" href="#/financial-dashboard"
                        ng-class="{ 'active': isActive('/financial-dashboard')}" ng-if="showNavLink">Financial Hub</a>
                    <a class="nav-link mx-2" href="#/finvu-connect" ng-class="{ 'active': isActive('/finvu-connect')}" ng-if="showNavLink">
                        <i class="fas fa-university me-1"></i>Link Bank
                    </a>
                    <a class="nav-link mx-2" href="#/profile" ng-class="{ 'active': isActive('/profile')}"
                        ng-if="showNavLink">Profile</a>
                    <a class="nav-link mx-2" href="#/pricing" ng-if="showNavLink" title="Subscription">
                        <span class="badge rounded-pill" ng-class="{
                            'bg-secondary': subscriptionPlan === 'FREE' || !subscriptionPlan,
                            'bg-primary': subscriptionPlan === 'PRO',
                            'bg-warning text-dark': subscriptionPlan === 'PREMIUM',
                            'bg-dark': subscriptionPlan === 'ENTERPRISE'
                        }">{{subscriptionPlanName || subscriptionPlan || 'Free'}}</span>
                    </a>
                    <a class="nav-link mx-2" href="#/login" ng-class="{ 'active': isActive('/login')}"
                        ng-if="showLoginLink">Login</a>
                    <a class="nav-link mx-2" href="#/logout" ng-class="{ 'active': isActive('/logout')}"
                        ng-if="showLogoutLink" ng-click="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>
</header>
